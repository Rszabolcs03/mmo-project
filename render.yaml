services:
  - type: web
    name: mmo-project-socket-server
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://mmo-project-a4975.web.app
      - key: REQUIRE_FIREBASE_AUTH
        value: false
